<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Interno</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1497366216548-37526070297c') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 20, 40, 0.85);
      backdrop-filter: blur(8px);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 1200px;
      width: 90%;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      margin-bottom: 30px;
      opacity: 0.8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 30px 20px;
      text-decoration: none;
      color: white;
      transition: 0.3s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .card:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.1);
    }

    .card img {
      width: 50px;
      margin-bottom: 15px;
    }

    .footer {
      margin-top: 30px;
      font-size: 0.9rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
  <h1>Bem-vindo!</h1>
  <p>Acesse rapidamente os sistemas da empresa</p>

  <div class="grid">

    <a class="card" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968705.png">
      <div>IXC</div>
    </a>

    <a class="card" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/2462/2462719.png">
      <div>OPA</div>
    </a>

    <a class="card" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
      <div>Chatmix</div>
    </a>

    <a class="card" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
      <div>Tutoriais</div>
    </a>

    <a class="card" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/1828/1828919.png">
      <div>Presets</div>
    </a>

    <a class="card" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968350.png">
      <div>Grafana</div>
    </a>

    <a class="card" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/2920/2920277.png">
      <div>Provcam</div>
    </a>

    <a class="card" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/1041/1041916.png">
      <div>Prov Conecta</div>

    <a class="card" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png">

    </a>

    <a class="card" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968899.png">

    </a>

    <a class="card" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/5968/5968654.png">
      <div>Trello</div>
    </a>

    <a class="card" href="#">
      <img src="https://cdn-icons-png.flaticon.com/512/888/888879.png">

  </div>

  <div class="footer">
    Segurança • Produtividade • Conectividade
  </div>
</div>

</body>
</html>
